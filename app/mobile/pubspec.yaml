name: opendray
description: opendray mobile — multi-CLI gateway control
publish_to: none
version: 0.1.0+1

environment:
  sdk: ^3.11.0
  flutter: ">=3.41.0"

dependencies:
  cupertino_icons: ^1.0.8
  dio: ^5.7.0
  # file_picker is required for backup restore + admin import:
  # the operator must hand opendray a .tar.gz.enc bundle or a
  # JSON export package from the phone's file system. The web
  # client uses <input type=file>; mobile needs an explicit
  # native picker since dart:html isn't available.
  file_picker: ^8.1.6
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  flutter_riverpod: ^2.6.1
  flutter_secure_storage: ^9.2.2
  flutter_svg: ^2.0.10+1
  freezed_annotation: ^2.4.4
  go_router: ^14.6.2
  image_picker: ^1.1.2
  intl: ^0.20.2
  json_annotation: ^4.9.0
  local_auth: ^2.3.0
  package_info_plus: ^8.1.1
  path: ^1.9.1
  pretty_dio_logger: ^1.4.0
  shared_preferences: ^2.3.4
  slang: ^4.14.0
  slang_flutter: ^4.14.0
  web_socket_channel: ^3.0.1
  xterm: ^4.0.0
  yaml: ^3.1.2

dev_dependencies:
  build_runner: ^2.4.13
  flutter_test:
    sdk: flutter
  freezed: ^2.5.7
  json_serializable: ^6.9.0
  slang_build_runner: ^4.14.0
  very_good_analysis: ^7.0.0

# Use the in-repo xterm fork (third_party/xterm) which enables IME features
# (voice input, suggestions, personalized learning) on the terminal input.
# Upstream xterm 4.0.0 hard-codes these flags off in custom_text_edit.dart.
dependency_overrides:
  xterm:
    path: ../../third_party/xterm

flutter:
  uses-material-design: true
  assets:
    - assets/provider_icons/
    - assets/channel_icons/
